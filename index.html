<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hello Teresa</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f4f8;
      font-family: Arial, sans-serif;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      padding: 48px 64px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
    }

    h1 {
      color: #3b82f6;
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    p {
      color: #6b7280;
      font-size: 1.1rem;
      margin-bottom: 32px;
    }

    button {
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 12px 32px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background-color: #2563eb;
    }

    input {
      border: 1px solid #d1d5db;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 1rem;
      width: 200px;
      margin-bottom: 16px;
      outline: none;
    }

    input:focus {
      border-color: #3b82f6;
    }

    #welcome-msg {
      color: #3b82f6;
      font-size: 1.1rem;
      min-height: 1.5rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Hello Teresa</h1>
    <p>My first Claude Code project</p>
    <input type="text" id="name-input" placeholder="輸入你的名字" />
    <br>
    <button onclick="sayHello()">Say Hello</button>
    <p id="welcome-msg"></p>
  </div>
  <script>
    function sayHello() {
      const name = document.getElementById('name-input').value.trim();
      const msg = document.getElementById('welcome-msg');
      msg.textContent = name ? `Welcome, ${name}!` : 'Welcome!';
    }
  </script>
</body>
</html>
